function delRow(kind,id){if(!confirm("Delete this entry?"))return;DB[kind]=DB[kind].filter(x=>x.id!==id);save();render();}

/* ================= TIMESHEETS ================= */
let ROUND_MODE = (DB && DB.roundMode) || "nearest";     // 'up' | 'nearest' | 'off'
const CLINIC = (DB && DB.clinic) || {name:"First Rehabilitation",addr1:"733 U.S. Highway One, Suite 2A",addr2:"North Palm Beach, FL 33408"};
const ANCHOR = new Date(2026,5,22);                 // Mon Jun 22, 2026 → period runs to Sun Jul 5; next cycle starts Mon Jul 6; rolls every other Monday
let tsPeriod = periodStartFor(new Date());          // current period start (Date)
let tsAdminEmp = null;                              // admin: which employee's sheet
let tsDetailEmp = null;                             // admin: open a single sheet (null = roster list)

function periodStartFor(dt){ const ms=86400000; const per=Math.floor(Math.floor((dt-ANCHOR)/ms)/14); return new Date(ANCHOR.getTime()+per*14*ms); }
function fmtD(dt){ return `${dt.getMonth()+1}/${dt.getDate()}/${dt.getFullYear()}`; }
function parseD(s){ const p=String(s).split("/").map(Number); return new Date(p[2],p[0]-1,p[1]); }
function hmToMin(hm){ if(!hm) return null; const p=hm.split(":"); return (+p[0])*60+(+p[1]); }
function minToHM(min){ min=((min%1440)+1440)%1440; return `${String(Math.floor(min/60)).padStart(2,"0")}:${String(min%60).padStart(2,"0")}`; }
function roundMin(min){ if(ROUND_MODE==="off"||min==null) return min; return ROUND_MODE==="nearest"?Math.round(min/15)*15:Math.ceil(min/15)*15; }
function fmt12(hm){ if(!hm) return ""; let [h,m]=hm.split(":").map(Number); const ap=h>=12?"p":"a"; h=h%12; if(h===0)h=12; return `${h}:${String(m).padStart(2,"0")}${ap}`; }

/* ===== One-tap punch clock — Check in when you arrive, Check out when you step out.
   Writes real times straight into today's timesheet (an in-progress check-in is an
   open segment that doesn't count toward hours until it's closed). ===== */
function nowHM(){ const n=new Date(); return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`; }
function clockRead(empId){
  const ts=getTS(empId,periodStartFor(new Date()));
  const t=fmtD(new Date()); const i=ts.days.findIndex(d=>d.date===t);
  if(i<0) return null;
  const day=ts.days[i];
  return {i,day,open:(day.segs||[]).find(s=>s.in&&!s.out)};
}
function clockCardHTML(empId){
  const st=clockRead(empId); if(!st) return "";
  const done=(st.day.segs||[]).filter(s=>s.in&&s.out);
  const worked=dayWorked(st.day,false);
  const now=new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  return `<div class="card clock-card">
    <div class="cc-left">
      <div class="cc-time">${now}</div>
      <div class="cc-sub">${st.open?`On the clock since <b>${ampm(st.open.in)}</b>`:(done.length?`<b>${round(worked)} h</b> logged today — welcome back`:`Tap to start today's timesheet`)}</div>
      ${done.length?`<div class="cc-segs">${done.map(s=>`<span>${fmt12(s.in)}–${fmt12(s.out)}</span>`).join("")}</div>`:""}
    </div>
    ${st.open
      ? `<button class="cc-btn out" onclick="clockOut()">⏸&nbsp; Check out</button>`
      : `<button class="cc-btn" onclick="clockIn()">▶&nbsp; Check in</button>`}
  </div>`;
}
function clockIn(){
  const ts=ensureTS(SESSION,fmtD(periodStartFor(new Date())));
  const t=fmtD(new Date()); const day=ts.days.find(d=>d.date===t);
  if(!day){flash("Today isn't in this pay period");return;}
  if((day.segs||[]).find(s=>s.in&&!s.out)){flash("You're already checked in");return;}
  const hm=nowHM();
  day.segs=day.segs||[];
  day.segs.push({in:hm,out:"",shift:(+hm.split(":")[0])<12?"am":"pm"});
  save(true);render();flash(`Checked in at ${ampm(hm)} ✓ Have a great shift!`);
}
function clockOut(){
  const ts=ensureTS(SESSION,fmtD(periodStartFor(new Date())));
  const t=fmtD(new Date()); const day=ts.days.find(d=>d.date===t);
  const open=day&&(day.segs||[]).find(s=>s.in&&!s.out);
  if(!open){flash("You're not checked in");return;}
  const hm=nowHM();
  if(hmToMin(hm)<=hmToMin(open.in)){ day.segs=day.segs.filter(s=>s!==open); save(true); render(); flash("Check-in cancelled"); return; }
  open.out=hm;
  save(true);render();flash(`Checked out at ${ampm(hm)} — ${round(segHours(open,false))}h logged ✓`);
}
function segHours(seg,useRound){ let i=hmToMin(seg.in), o=hmToMin(seg.out); if(i==null||o==null) return 0; if(useRound){i=roundMin(i);o=roundMin(o);} let d=o-i; if(d<0)d+=1440; return d/60; }
function dayWorked(day,useRound){ return (day.segs||[]).reduce((s,seg)=>s+segHours(seg,useRound),0); }
function dayTotal(day,useRound){ return dayWorked(day,useRound)+(+day.vac||0); }
function tsWorked(ts,useRound){ return ts.days.reduce((s,d)=>s+dayWorked(d,useRound),0); }
function tsVac(ts){ return ts.days.reduce((s,d)=>s+(+d.vac||0),0); }
function tsTotal(ts,useRound){ return tsWorked(ts,useRound)+tsVac(ts); }
function tsWorkedYear(empId,y,useRound){ return DB.timesheets.filter(t=>t.empId===empId).reduce((s,t)=>s+t.days.filter(d=>yearOf(d.date)===y).reduce((a,d)=>a+dayWorked(d,useRound),0),0); }
function buildEmptyTS(empId,startDt){ const days=[]; for(let i=0;i<14;i++){const dt=new Date(startDt.getTime()+i*86400000); days.push({date:fmtD(dt),segs:[],vac:0,notes:""});} return {id:null,empId,start:fmtD(startDt),submitted:false,approvedBy:"",days}; }
function findTS(empId,startStr){ return DB.timesheets.find(t=>t.empId===empId&&t.start===startStr); }
function getTS(empId,startDt){ return findTS(empId,fmtD(startDt)) || buildEmptyTS(empId,startDt); }
function ensureTS(empId,startStr){ let ts=findTS(empId,startStr); if(!ts){ ts=buildEmptyTS(empId,parseD(startStr)); ts.id=uid("ts"); DB.timesheets.push(ts);} return ts; }
function setRound(m){ ROUND_MODE=m; DB.roundMode=m; save(true); render(); }
function tsStep(n){ tsPeriod=new Date(tsPeriod.getTime()+n*14*86400000); render(); }
function periodLabel(startDt){ const e=new Date(startDt.getTime()+13*86400000); const o={month:"short",day:"numeric"}; return `${startDt.toLocaleDateString("en-US",o)} – ${e.toLocaleDateString("en-US",o)}, ${e.getFullYear()}`; }

/* ---- shared renderer ---- */
function renderTimesheet(v, empId, isAdmin){
  const R=isAdmin;                           // admin sees rounded; employee sees actual
  const startStr=fmtD(tsPeriod);
  const ts=getTS(empId,tsPeriod);
  const me=emp(empId);
  const worked=tsWorked(ts,R), vac=tsVac(ts), total=tsTotal(ts,R);
  const dowNames=["MON","TUES","WED","THURS","FRI","SAT","SUN"];
  function dayCard(d,i){
    const dt=parseD(d.date), dow=(dt.getDay()+6)%7, weekend=dow>=5;
    const segs=(d.segs||[]).filter(s=>s.in&&s.out);
    const dt2=dayTotal(d,R);
    const isHol=(d.notes||"").toLowerCase().includes("holiday");
    const tdy=new Date(); tdy.setHours(0,0,0,0); const isToday=+dt===+tdy;
    const showTime=hm=>fmt12(R?minToHM(roundMin(hmToMin(hm))):hm);
    const KM={am:["AM","k-am"],pm:["PM","k-pm"],note:["NOTE","k-note"]};
    return `<div class="ts-day ${weekend?"weekend":""} ${isHol?"holiday":""} ${isToday?"today":""} ${dt2>0?"has":""}">
      <div class="ts-day-top">
        <div class="ts-daycol"><span class="ts-dow">${dowNames[dow]}</span><span class="ts-date">${dt.getDate()}</span><span class="ts-mon">${dt.toLocaleString("en-US",{month:"short"})}</span></div>
        <div class="ts-total ${dt2===0?"zero":""}">${dt2?round(dt2)+"h":"—"}</div>
      </div>
      <div class="ts-segs">
        ${segs.length?segs.map(s=>{const h=segHours(s,R);const km=KM[segKind(s)]||KM.am;return `<div class="ts-seg"><span class="seg-lbl ${km[1]}">${km[0]}</span><span class="seg-time">${showTime(s.in)}–${showTime(s.out)}</span><b>${round(h)}h</b></div>`;}).join(""):(d.vac>0?"":'<div class="ts-empty">No time logged</div>')}
        ${d.vac>0?`<div class="ts-vac">🌴 ${round(d.vac)}h ${esc((d.notes||"PTO").split(" ")[0])}</div>`:""}
        ${d.notes&&d.vac===0&&!isHol?`<div class="ts-note">${esc(d.notes)}</div>`:""}
      </div>
      <button class="ts-edit ${segs.length||d.vac?"":"add"}" onclick="openDay('${empId}','${startStr}',${i})">${segs.length||d.vac?"Edit":"＋ Add time"}</button>
    </div>`;
  }
  const wk=(a,b)=>ts.days.slice(a,b).map((d,idx)=>dayCard(d,a+idx)).join("");
  const w1=ts.days.slice(0,7).reduce((s,d)=>s+dayTotal(d,R),0), w2=ts.days.slice(7,14).reduce((s,d)=>s+dayTotal(d,R),0);
  const statusPill = ts.approvedBy?`<span class="st-pill st-approved">Approved by ${esc(ts.approvedBy.split(" ")[0])}</span>`
    : ts.submitted?`<span class="st-pill st-pending">Submitted</span>`
    : `<span class="st-pill" style="background:#eee;color:#777">Draft</span>`;
  const daysWorked=ts.days.filter(d=>dayWorked(d,R)>0).length;
  const am=amHours(ts,R),pm=pmHours(ts,R),note=noteHours(ts,R),ot=periodOT(ts,R);
  const metrics=`<div class="ts-metrics">
     <div class="tm big"><div class="tm-k">Total hours</div><div class="tm-v">${round(total)}<small>h</small></div><div class="tm-sub">${daysWorked} ${daysWorked===1?"day":"days"} worked${vac>0?` · ${round(vac)}h off`:""}</div></div>
     <div class="tm"><div class="tm-k">☀️ Morning</div><div class="tm-v">${round(am)}<small>h</small></div></div>
     <div class="tm"><div class="tm-k">🌤️ Afternoon</div><div class="tm-v">${round(pm)}<small>h</small></div></div>
     ${note>0?`<div class="tm"><div class="tm-k">📝 Notes</div><div class="tm-v">${round(note)}<small>h</small></div></div>`:""}
     ${ot>0?`<div class="tm ot"><div class="tm-k">🌴 Overtime</div><div class="tm-v">${round(ot)}<small>h</small></div><div class="tm-sub">${getsPTO(empId)?(ts.approvedBy?"banked":"→ banked on approve"):"over 80/period"}</div></div>`:""}
   </div>`;
  v.innerHTML=`
   <div class="section-title" style="margin-bottom:8px">
     <h2>${isAdmin?esc(me.name)+"’s timesheet":"My timesheet"}</h2>
     <span class="hint">${statusPill}</span>
   </div>
   <div class="ts-toolbar">
     <div class="cal-nav"><button onclick="tsStep(-1)">‹</button><div class="cal-month" style="min-width:210px;font-size:18px">${periodLabel(tsPeriod)}</div><button onclick="tsStep(1)">›</button></div>
     <div class="grow"></div>
     ${isAdmin?roundSel():""}
     <button class="btn ghost" onclick="printTimesheet('${empId}','${startStr}')">🖨 Print</button>
     ${isAdmin
       ? (ts.approvedBy?`<button class="btn ghost" onclick="unapproveTS('${empId}','${startStr}')">Un-approve</button>`:`<button class="btn" onclick="approveTS('${empId}','${startStr}')">Approve</button>`)
       : (ts.submitted?`<button class="btn ghost" onclick="unsubmitTS('${empId}','${startStr}')">Reopen</button>`:`<button class="btn" onclick="submitTS('${empId}','${startStr}')">Submit for approval</button>`)}
   </div>
   ${metrics}
   <div class="ts-week-label">Week 1 <span class="wsum">${round(w1)} h</span></div>
   <div class="ts-grid">${wk(0,7)}</div>
   <div class="ts-week-label">Week 2 <span class="wsum">${round(w2)} h</span></div>
   <div class="ts-grid">${wk(7,14)}</div>`;
}
function viewMyTimesheet(v){ renderTimesheet(v, SESSION, false); }
/* shift classification & totals */
function segIsPM(seg){ const i=hmToMin(seg.in); return i!=null && i>=720; }   // starts at/after 12:00 noon
function segKind(seg){ return seg.shift || (segIsPM(seg)?"pm":"am"); }        // 'am' | 'pm' | 'note'
function segsOf(d,kind){ return (d.segs||[]).filter(s=>s.in&&s.out&&segKind(s)===kind); }
function dayShifts(d){ return {am:segsOf(d,"am")[0]||{in:"",out:""}, pm:segsOf(d,"pm")[0]||{in:"",out:""}, note:segsOf(d,"note")[0]||{in:"",out:""}}; }
function kindHours(ts,kind,R){ return ts.days.reduce((s,d)=>s+segsOf(d,kind).reduce((a,x)=>a+segHours(x,R),0),0); }
function amHours(ts,R){ return kindHours(ts,"am",R); }
function pmHours(ts,R){ return kindHours(ts,"pm",R); }
function noteHours(ts,R){ return kindHours(ts,"note",R); }
function hasNotes(ts){ return ts.days.some(d=>segsOf(d,"note").length); }
/* helper kept for reference: worked hours in one 7-day week of the period */
function weekWorked(ts,wk,R){ const a=wk*7; return ts.days.slice(a,a+7).reduce((s,d)=>s+dayWorked(d,R),0); }
/* overtime = hours actually worked beyond 80 in the two-week pay period → banked time */
function periodOT(ts,R){ return Math.max(0, tsWorked(ts,R) - 80); }
function tsHasEntries(ts){ return ts.days.some(d=>(d.segs||[]).some(s=>s.in&&s.out) || (+d.vac||0)>0); }
function statusPill(ts){
  return ts.approvedBy?`<span class="st-pill st-approved">✓ Approved</span>`
    : ts.submitted?`<span class="st-pill st-approved">✓ Submitted</span>`
    : tsHasEntries(ts)?`<span class="st-pill st-pending">◐ In progress</span>`
    : `<span class="st-pill" style="background:#f6e3d6;color:#b1730f">⚠︎ Not started</span>`;
}
function periodNav(){ return `<div class="cal-nav"><button onclick="tsStep(-1)">‹</button><div class="cal-month" style="min-width:200px;font-size:17px">${periodLabel(tsPeriod)}</div><button onclick="tsStep(1)">›</button></div>`; }
function roundSel(){ return `<div class="round-sel"><label>Rounding</label><select onchange="setRound(this.value)">
    <option value="up" ${ROUND_MODE==="up"?"selected":""}>Up to 15 min</option>
    <option value="nearest" ${ROUND_MODE==="nearest"?"selected":""}>Nearest 15 min</option>
    <option value="off" ${ROUND_MODE==="off"?"selected":""}>Exact</option></select></div>`; }

function viewAdminTimesheets(v){ if(tsDetailEmp) renderAdminDetail(v); else renderAdminRoster(v); }
function openAdminSheet(id){ tsDetailEmp=id; render(); window.scrollTo(0,0); }
function backToRoster(){ tsDetailEmp=null; render(); window.scrollTo(0,0); }

/* ---- roster overview: who's entered time, who's blank ---- */
function clearPeriodTS(){
  const cur=fmtD(tsPeriod);
  const list=(DB.timesheets||[]).filter(t=>t.start===cur);
  if(!confirm(`Clear ALL timesheet entries for ${periodLabel(tsPeriod)}?\n\nThis wipes what everyone has entered for this pay period. It can't be undone.`)) return;
  /* blank the days (marked as intentional) instead of deleting records — the server refuses silent record loss */
  list.forEach(ts=>{ ts.submitted=false; ts.approvedBy=""; ts.days=(ts.days||[]).map(d=>({date:d.date,segs:[],vac:0,notes:"",cleared:true})); });
  save(); render(); flash(`Cleared timesheets for this period${list.length?` (${list.length})`:""}`);
}
function renderAdminRoster(v){
  const emps=DB.employees.filter(e=>e.active && !e.salaried).sort((a,b)=>a.name.localeCompare(b.name));
  const rows=emps.map(e=>{const ts=getTS(e.id,tsPeriod); const started=tsHasEntries(ts);
    const st=ts.approvedBy?"approved":ts.submitted?"submitted":started?"inprogress":"notstarted";
    return {e,ts,st,started,total:tsTotal(ts,true)};});
  const needs=rows.filter(r=>r.st==="submitted");
  const completed=rows.filter(r=>r.st==="approved");
  const waiting=rows.filter(r=>r.st==="inprogress"||r.st==="notstarted");
  const nInProg=rows.filter(r=>r.st==="inprogress").length, nNot=rows.filter(r=>r.st==="notstarted").length;
  const line=(r)=>`<tr class="clickrow" onclick="openAdminSheet('${r.e.id}')">
      <td><b style="${r.st==="notstarted"?'color:var(--muted)':''}">${esc(r.e.name)}</b></td>
      <td>${statusPill(r.ts)}</td>
      <td class="num">${r.started?round(r.total)+' h':'—'}</td>
      <td class="num"><div class="row-actions" style="justify-content:flex-end">
        ${r.st==="submitted"?`<button class="btn sm" onclick="event.stopPropagation();approveTS('${r.e.id}','${esc(r.ts.start)}')">✓ Approve</button>`:""}
        <button class="btn sm ghost" onclick="event.stopPropagation();openAdminSheet('${r.e.id}')">${r.started?'Open':'Enter'} ›</button></div></td>
    </tr>`;
  const table=(list)=>`<div class="tbl-wrap"><table>
      <thead><tr><th>Employee</th><th>Status</th><th class="num">Period hrs</th><th></th></tr></thead>
      <tbody>${list.map(line).join("")}</tbody></table></div>`;
  v.innerHTML=`
   <div class="section-title" style="margin-bottom:6px"><h2>Timesheets</h2><span class="hint">${periodLabel(tsPeriod)}</span></div>
   <div class="ts-toolbar">${periodNav()}<div class="grow"></div>${roundSel()}<button class="btn ghost" onclick="clearPeriodTS()">🧹 Clear this period</button></div>
   <div class="stat-strip" style="margin:4px 0 16px">
     <div class="stat"><div class="k">Needs approval</div><div class="v">${needs.length}</div></div>
     <div class="stat alt"><div class="k">Completed</div><div class="v">${completed.length}<span class="u">of ${emps.length}</span></div></div>
     <div class="stat alt"><div class="k">In progress</div><div class="v">${nInProg}</div></div>
     <div class="stat alt"><div class="k">Not started</div><div class="v">${nNot}</div></div>
   </div>
   ${needs.length?`<div class="rgroup warn">🕒 Needs approval · ${needs.length}</div>${table(needs)}`
     :`<div class="rgroup" style="color:var(--muted)">Nothing waiting for approval for this period.</div>`}
   ${waiting.length?`<div class="rgroup warn" style="margin-top:18px">⚠︎ Still to do · ${waiting.length}</div>${table(waiting)}`:``}
   ${completed.length?`<details class="logwrap" style="margin-top:18px"><summary>✓ Completed · ${completed.length}</summary>${table(completed)}</details>`:``}`;
}

  if(empId===SESSION) sendPushNotify({kind:"timeoff",title:"🕒 Timesheet submitted",body:`${emp(empId).name} submitted their timesheet for ${startStr}`,url:"/"}); }

function approveTS(empId,startStr){ const ts=ensureTS(empId,startStr); ts.submitted=true; ts.approvedBy=emp(SESSION).name; ts.approvedTs=Date.now(); const ev=round(periodOT(ts,true)); save();render();flash(ev>0&&getsPTO(empId)?`Approved · ${ev}h added to PTO`:"Approved");
  const who=emp(empId); if(who&&who.email&&empId!==SESSION) sendPushNotify({kind:"timeoff_decision",toEmail:who.email,title:"✅ Timesheet approved",body:`Your timesheet for ${startStr} was approved`,url:"/"}); }
function unapproveTS(empId,startStr){ const ts=findTS(empId,startStr); if(ts){ts.approvedBy="";save();render();} }

/* ---- day editor (Morning / Afternoon shifts, auto AM-PM) ---- */
// clinic hours reference: mornings 7:30–12, afternoons 1:30–5:30 (shown as placeholders)
// parse loose input ("730","7:30","7") into 24h "HH:MM"; pm=true forces afternoon
function parseShift(str,pm){
  str=String(str||"").trim().toLowerCase().replace(/\s/g,"");
  if(!str) return "";
  const explicitPM=/p/.test(str), explicitAM=/a/.test(str);
  str=str.replace(/[^0-9:]/g,"");
  if(!str) return "";
  let h,m;
  if(str.includes(":")){ const p=str.split(":"); h=parseInt(p[0]||"0"); m=parseInt(p[1]||"0"); }
  else if(str.length<=2){ h=parseInt(str); m=0; }
  else { h=parseInt(str.slice(0,str.length-2)); m=parseInt(str.slice(-2)); }
  if(isNaN(h)||isNaN(m)||h>23||m>59) return "";
  if(h>=13){ /* already 24h */ }
  else{
    let wantPM;
    if(explicitPM) wantPM=true;
    else if(explicitAM) wantPM=false;
    else if(pm==="flex") wantPM=(h>=1 && h<=6);   // notes: 7–11→AM, 12→noon, 1–6→PM
    else wantPM=pm;
    if(wantPM && h!==12) h+=12;                     // 12 stays noon
  }
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}
function maskTime(str){
  str=String(str||"").toLowerCase().trim();
  const ap=(str.match(/[ap]/)||[""])[0];              // keep a typed a/p (for the flexible notes field)
  const d=str.replace(/[^0-9]/g,"").slice(0,4);       // work from the raw digits so a 4th digit is never dropped
  let out;
  if(d.length<=2) out=d;
  else if(d.length===3) out=d[0]+":"+d.slice(1);      // 3 digits → h:mm (e.g. 130 → 1:30)
  else out=d.slice(0,2)+":"+d.slice(2);               // 4 digits → hh:mm (e.g. 1230 → 12:30)
  return out+(ap||"");
}
function disp12(v){ if(!v) return ""; let p=v.split(":"),h=+p[0],m=+p[1]; let hh=h%12; if(hh===0)hh=12; return hh+":"+String(m).padStart(2,"0"); }
function ampm(v){ return v?fmt12(v).replace(/[ap]$/,x=>x==="p"?" PM":" AM"):"—"; }
function shiftField(id,val,mode){
  const handler = mode==="flex" ? `onNote('${id}')` : `onShift('${id}',${mode})`;
  return `<div class="sf">
    <input class="inp shift-in" id="${id}" value="${disp12(val)}" placeholder="" inputmode="numeric" oninput="${handler}" autocomplete="off">
    <span class="sf-preview" id="${id}_p">${val?ampm(val):"—"}</span>
  </div>`;
}
function openDay(empId,startStr,idx){
  const ts=getTS(empId,parseD(startStr));
  const src=ts.days[idx];
  const admin=emp(SESSION)&&emp(SESSION).role==="admin";
  const flex=!!(emp(empId)&&emp(empId).notesTime);
  const sh=dayShifts(src);
  const st={mIn:sh.am.in,mOut:sh.am.out,aIn:sh.pm.in,aOut:sh.pm.out,nIn:sh.note.in,nOut:sh.note.out};
  /* restore anything typed here that never got saved (survives refreshes, crashes, everything) */
  let draftVac=+src.vac||0, draftNotes=src.notes||"", restored=false;
  try{
    const raw=sessionStorage.getItem("_dayDraft");
    if(raw){ const dr=JSON.parse(raw);
      if(dr.key===`${empId}|${startStr}|${idx}` && Date.now()-(dr.ts||0)<43200000){
        Object.assign(st,dr.shift||{});
        if(dr.vac!=="") draftVac=parseFloat(dr.vac)||0;
        if(dr.notes) draftNotes=dr.notes;
        restored=true;
      } }
  }catch(e){}
  window._editDay={empId,startStr,idx,date:src.date,admin,flex,shift:st,vac:draftVac,notes:draftNotes,restored};
  const dt=parseD(src.date);
  const helper = admin
    ? `<div class="round-hint">Totals round <b>${ROUND_MODE==="off"?"exactly as entered":ROUND_MODE+" to the quarter hour"}</b> (e.g. 9:10 → 9:15).</div>`
    : `<div class="round-hint">Just type the time — mornings read as AM, afternoons as PM automatically. <b>Working straight through lunch?</b> Put your whole shift in Morning (clock in 8:00, clock out 2:30).</div>`;
  const noteBlock = flex ? `
    <div class="shift-block note">
      <div class="shift-head"><span class="shift-name">📝 Notes / cleaning</span><span class="shift-sub">any time</span></div>
      <div class="shift-grid">
        <div class="field"><label>Time in</label>${shiftField("n_in",st.nIn,"flex")}</div>
        <div class="field"><label>Time out</label>${shiftField("n_out",st.nOut,"flex")}</div>
      </div>
      <div class="round-hint" style="margin:6px 0 0">For weekend / random note or cleaning time — add “a” or “p” if needed (e.g. 8p).</div>
    </div>` : "";
  const prevIdx=(()=>{ for(let i=idx-1;i>=0;i--){ if((ts.days[i].segs||[]).some(s=>s.in&&s.out)) return i; } return -1; })();
  const prevLbl = prevIdx>=0 ? parseD(ts.days[prevIdx].date).toLocaleDateString("en-US",{weekday:"short"}) : "";
  const quickFill = `<div class="quickfill">${prevIdx>=0?`<button class="qf copy" onclick="copyPrevDay()">⧉ Same as ${prevLbl}</button>`:""}<button class="qf" onclick="presetDay()">Full day</button><button class="qf" onclick="presetAM('07:30','12:00')">Morning</button><button class="qf" onclick="presetPM('13:30','17:30')">Afternoon</button></div>`;
  openModal(`<h3>${dt.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</h3><div class="body" id="dayBody">
    ${restored?`<div class="sec-status ok">✔ We saved what you were typing — it's all still here. Tap "Save day" to keep it.</div>`:""}
    ${quickFill}
    <div class="shift-block">
      <div class="shift-head"><span class="shift-name">☀️ Morning</span><span class="shift-sub">AM</span></div>
      <div class="shift-grid">
        <div class="field"><label>Clock in</label>${shiftField("m_in",st.mIn,false)}</div>
        <div class="field"><label>Clock out</label>${shiftField("m_out",st.mOut,false)}</div>
      </div>
    </div>
    <div class="shift-block pm">
      <div class="shift-head"><span class="shift-name">🌤️ Afternoon</span><span class="shift-sub">PM</span></div>
      <div class="shift-grid">
        <div class="field"><label>Clock in</label>${shiftField("a_in",st.aIn,true)}</div>
        <div class="field"><label>Clock out</label>${shiftField("a_out",st.aOut,true)}</div>
      </div>
    </div>
    ${noteBlock}
    ${helper}
    <div class="row2">
      <div class="field"><label>Vacation / PTO hours</label><input class="inp" id="d_vac" type="number" step="0.25" value="${window._editDay.vac?round(window._editDay.vac):""}" placeholder="0" oninput="recalcDay()"></div>
      <div class="field"><label>Notes</label><input class="inp" id="d_notes" value="${esc(window._editDay.notes||"")}" placeholder="e.g. Holiday" oninput="recalcDay()"></div>
    </div>
    <div class="day-total-line"><span>Daily total</span><span id="dayTotalOut">0 h</span></div>
  </div>
  <div class="foot"><button class="btn danger" style="margin-right:auto" onclick="clearDay()">Clear day</button><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveDay()">Save day</button></div>`);
  recalcDay();
}
function onNote(id){
  const el=$("#"+id); if(!el) return;
  const masked=maskTime(el.value); el.value=masked;
  const key={n_in:"nIn",n_out:"nOut"}[id];
  const v=parseShift(masked,"flex");
  window._editDay.shift[key]=v;
  const p=$("#"+id+"_p"); if(p) p.textContent=ampm(v);
  recalcDay();
}
function setSeg(inId,outId,inKey,outKey,inHM,outHM){
  const s=window._editDay.shift; s[inKey]=inHM||""; s[outKey]=outHM||"";
  const setF=(id,hm)=>{const el=$("#"+id); if(el){el.value=hm?disp12(hm):""; const p=$("#"+id+"_p"); if(p)p.textContent=hm?ampm(hm):"—";}};
  setF(inId,inHM); setF(outId,outHM); recalcDay();
}
function presetAM(a,b){ setSeg("m_in","m_out","mIn","mOut",a,b); }
function presetPM(a,b){ setSeg("a_in","a_out","aIn","aOut",a,b); }
function presetDay(){ presetAM("07:30","12:00"); presetPM("13:30","17:30"); }
function copyPrevDay(){
  const {empId,startStr,idx}=window._editDay; const ts=getTS(empId,parseD(startStr));
  let src=null; for(let i=idx-1;i>=0;i--){ if((ts.days[i].segs||[]).some(s=>s.in&&s.out)){src=ts.days[i];break;} }
  if(!src){flash("No earlier day to copy");return;}
  const sh=dayShifts(src);
  setSeg("m_in","m_out","mIn","mOut",sh.am.in,sh.am.out);
  setSeg("a_in","a_out","aIn","aOut",sh.pm.in,sh.pm.out);
  if(window._editDay.flex) setSeg("n_in","n_out","nIn","nOut",sh.note.in,sh.note.out);
  flash("Copied last day");
}
function onShift(id,pm){
  const el=$("#"+id); if(!el) return;
  const masked=maskTime(el.value); el.value=masked;
  const key={m_in:"mIn",m_out:"mOut",a_in:"aIn",a_out:"aOut"}[id];
  let v=parseShift(masked,pm);
  // let a shift run straight through lunch: if a clock-out lands at/before its clock-in, read it as PM
  if(v && /_out$/.test(id)){
    const inV=window._editDay.shift[id==="m_out"?"mIn":"aIn"];
    if(inV){ const iv=hmToMin(inV), ov=hmToMin(v); if(ov<=iv && (+v.split(":")[0])<12) v=minToHM(ov+720); }
  }
  window._editDay.shift[key]=v;
  const p=$("#"+id+"_p"); if(p) p.textContent=ampm(v);
  recalcDay();
}
function shiftSegs(){
  const s=window._editDay.shift; const out=[];
  if(s.mIn&&s.mOut) out.push({in:s.mIn,out:s.mOut,shift:"am"});
  if(s.aIn&&s.aOut) out.push({in:s.aIn,out:s.aOut,shift:"pm"});
  if(s.nIn&&s.nOut) out.push({in:s.nIn,out:s.nOut,shift:"note"});
  return out;
}
function saveDayDraft(){ try{ const e=window._editDay; if(!e) return;
  sessionStorage.setItem("_dayDraft",JSON.stringify({key:`${e.empId}|${e.startStr}|${e.idx}`,shift:e.shift,vac:($("#d_vac")?$("#d_vac").value:""),notes:($("#d_notes")?$("#d_notes").value:""),ts:Date.now()})); }catch(err){} }
function recalcDay(){ const vac=parseFloat($("#d_vac")?.value)||0; const worked=shiftSegs().reduce((a,seg)=>a+segHours(seg,window._editDay.admin),0); const el=$("#dayTotalOut"); if(el) el.textContent=round(worked+vac)+" h"; saveDayDraft(); }
function clearDay(){ const s=window._editDay.shift; s.mIn=s.mOut=s.aIn=s.aOut=s.nIn=s.nOut=""; const v=$("#d_vac"); if(v)v.value=""; const n=$("#d_notes"); if(n)n.value=""; window._editDay.vac=0; saveDay(); }
function saveDay(){ const {empId,startStr,idx}=window._editDay; const vac=parseFloat($("#d_vac")?.value)||0; const notes=$("#d_notes")?.value.trim()||""; const segs=shiftSegs(); const ts=ensureTS(empId,startStr);
  const day={date:ts.days[idx].date,segs,vac,notes};
  if(!segs.length) day.cleared=true;   // an intentionally emptied day — tells the server this isn't accidental loss
  ts.days[idx]=day;
  try{sessionStorage.removeItem("_dayDraft");}catch(e){} save();closeModal();render(); }


/* ---- print (matches paper form) ---- */
function printTimesheet(empId,startStr){
  const ts=getTS(empId,parseD(startStr)); const me=emp(empId);
  const R=emp(SESSION)&&emp(SESSION).role==="admin";
  const dowNames=["MON","TUES","WED","THURS","FRI","SAT","SUN"];
  const days=ts.days;
  const weekendIdx=days.map(d=>{const w=(parseD(d.date).getDay()+6)%7;return w>=5;});
  const showTime=hm=>fmt12(R?minToHM(roundMin(hmToMin(hm))):hm);
  function cellTimes(d,which){ const sh=dayShifts(d); const s=which===0?sh.am:sh.pm; return s.in&&s.out?showTime(s.in):""; }
  function cellOut(d,which){ const sh=dayShifts(d); const s=which===0?sh.am:sh.pm; return s.in&&s.out?showTime(s.out):""; }
  const cols=days.map((d,i)=>{const dt=parseD(d.date);return {dow:dowNames[(dt.getDay()+6)%7],date:`${dt.getDate()}-${dt.toLocaleString("en-US",{month:"short"})}`,we:weekendIdx[i],d};});
  const row=(label,fn)=>`<tr><td class="lbl">${label}</td>${cols.map(c=>`<td class="${c.we?"weekend":""}">${fn(c.d)}</td>`).join("")}</tr>`;
  const doc=`
    <div class="ph-head">
      <div class="co"><img src="${LOGO}" style="height:42px;margin-bottom:4px;display:block"><small>${esc(CLINIC.addr1)}<br>${esc(CLINIC.addr2)}</small></div>
      <div class="meta">Employee: <span class="ln">${esc(me.name)}</span><br>Signature: <span class="ln"></span><br>Approved by: <span class="ln">${esc(ts.approvedBy||"")}</span></div>
    </div>
    <table class="psheet">
      <tr class="dowrow"><th class="lbl">Day</th>${cols.map(c=>`<th class="${c.we?"weekend":""}">${c.dow}</th>`).join("")}</tr>
      <tr class="daterow"><td class="lbl">Date</td>${cols.map(c=>`<td class="${c.we?"weekend":""}">${c.date}</td>`).join("")}</tr>
      ${row("Time in",d=>cellTimes(d,0))}
      ${row("Time out",d=>cellOut(d,0))}
      ${row("Time in",d=>cellTimes(d,1))}
      ${row("Time out",d=>cellOut(d,1))}
      ${row("Vacation",d=>d.vac?round(d.vac):"")}
      ${row("Notes",d=>esc(d.notes||""))}
      <tr class="totalrow"><td class="lbl">TOTAL</td>${cols.map(c=>`<td class="${c.we?"weekend":""}">${dayTotal(c.d)?round(dayTotal(c.d)):""}</td>`).join("")}</tr>
    </table>
    <div class="psheet-foot"><span>Hours worked: ${round(tsWorked(ts,R))}</span><span>Vacation/PTO: ${round(tsVac(ts))}</span><span>Period total: ${round(tsTotal(ts,R))} h</span></div>`;
  $("#printArea").innerHTML=doc;
  $("#printDocScreen").innerHTML=doc;
  $("#printOverlay").classList.add("on");
}
function doPrint(){ window.print(); }
function closePrint(){ $("#printOverlay").classList.remove("on"); }


(async function(){
  initCloud();
  if(SB){
    await authSession();                         // restore an existing login on this device
    let rows=null, gotData=false;
    try{ rows=await cloudGet(); CLOUD=true; gotData=true; }catch(e){ CLOUD=false; }
    if(gotData && rows){                          // data is readable (we're signed in)
      DB=await reconcileLocal(rows); normalizeDB(); await save(true);
      if(AUTHED){ const me=empByEmail(AUTH_EMAIL); if(me) SESSION=me.id; }
    } else if(gotData && !rows){                  // cloud reachable but no record
      if(AUTHED){                                 // signed in, empty cloud → seed it
        DB=JSON.parse(JSON.stringify(SEED)); normalizeDB(); await save(true);
        const me=empByEmail(AUTH_EMAIL); if(me) SESSION=me.id;
      } else {                                    // locked down + not signed in → must sign in first
        DB=JSON.parse(JSON.stringify(SEED)); normalizeDB();   // roster kept local only for the sign-in screen; real data loads after login
        LOCKED=true;
      }
    } else {                                      // couldn't reach cloud → this-device fallback
      await load();
    }
  } else {
    await load();                                 // no backend available → this-device fallback
  }
  ROUND_MODE = DB.roundMode || "nearest";
  tsPeriod = periodStartFor(new Date());
  const withTS = DB.timesheets && DB.timesheets[0];
  tsAdminEmp = withTS ? withTS.empId : null;
  render();
  if(SESSION&&AUTHED) setTimeout(maybeAskPush,1200);
  if(SB){
    setInterval(cloudRefresh, 15000);
    document.addEventListener("visibilitychange",()=>{ if(!document.hidden) cloudRefresh(); });
    window.addEventListener("focus", cloudRefresh);
  }
})();
