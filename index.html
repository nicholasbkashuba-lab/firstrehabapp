<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>First Rehab — Team Portal</title>
<meta name="theme-color" content="#0E3A47">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="First Rehab">
<meta name="description" content="First Rehabilitation team portal — timesheets, PTO, calendar, and announcements.">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#0E3A47;--teal-2:#14505f;--coral:#F4A261;--gold:#E9C46A;
    --cream:#F6F1E7;--ink:#1d2b30;--muted:#6b7c82;--line:#e4ddcf;
    --white:#fffdf8;--ok:#2f8f6b;--warn:#c9603f;--pending:#c98a2f;
    --shadow:0 1px 3px rgba(14,58,71,.08),0 6px 20px rgba(14,58,71,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--cream);color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
  /* pull-to-refresh */
  #ptr{height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--cream);color:var(--teal);transition:height .18s ease}
  #ptr .ptr-ico{font-size:20px;opacity:.55}
  #ptr.ready .ptr-ico{opacity:1;font-weight:800;transform:scale(1.15)}
  #ptr.spin .ptr-ico{animation:ptrspin .7s linear infinite;opacity:1}
  @keyframes ptrspin{to{transform:rotate(360deg)}}
  h1,h2,h3,h4{font-family:"Playfair Display",Georgia,serif;margin:0}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  .wrap{max-width:1120px;margin:0 auto;padding:0 20px 90px}
  .hidden{display:none!important}

  /* Preview banner */
  .preview-bar{background:#132a31;color:var(--gold);font-size:12.5px;text-align:center;padding:7px 14px;letter-spacing:.3px}
  .preview-bar b{color:var(--cream)}

  /* ---------- LOGIN ---------- */
  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(1200px 600px at 70% -10%,#16515f 0%,var(--teal) 55%)}
  .login-card{background:var(--white);border-radius:20px;box-shadow:0 30px 80px rgba(0,0,0,.35);width:100%;max-width:430px;overflow:hidden}
  .login-head{background:var(--teal);color:var(--cream);padding:30px 32px 26px;text-align:center}
  .login-head .logo{font-family:"Playfair Display",serif;font-weight:800;font-size:26px;line-height:1.1}
  .login-head .tag{font-size:11px;text-transform:uppercase;letter-spacing:3px;color:var(--gold);font-weight:600;margin-top:8px}
  .login-body{padding:28px 32px 30px}
  .login-body h2{font-size:21px;color:var(--teal);margin-bottom:4px}
  .login-body p.sub{color:var(--muted);font-size:13.5px;margin:0 0 20px}
  .login-body label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700}
  .login-body input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;margin:6px 0 16px;font-size:15px}
  .login-body input:focus{outline:2px solid var(--coral);outline-offset:-1px;border-color:var(--coral)}
  .btn-full{width:100%;background:var(--coral);color:#3a2312;border:none;border-radius:11px;padding:13px;font-weight:700;font-size:15px;box-shadow:0 2px 0 #d98a45}
  .btn-full:hover{filter:brightness(1.03)}
  .sent-note{background:#eef6f2;border:1px solid #cfe6da;color:var(--ok);border-radius:10px;padding:12px 14px;font-size:13.5px;margin-top:14px;display:none}
  .auth-tabs{display:flex;gap:6px;background:#eef0ee;border-radius:10px;padding:4px;margin-bottom:16px}
  .auth-tab{flex:1;border:none;background:transparent;padding:9px 10px;border-radius:8px;font-size:13.5px;font-weight:700;color:var(--muted);cursor:pointer}
  .auth-tab.on{background:#fff;color:var(--teal);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .auth-msg{font-size:13px;margin-top:10px;min-height:16px}
  .auth-msg.err{color:#b23b4e}
  .auth-msg.ok{color:var(--ok)}
  .linkish{background:none;border:none;color:var(--teal);font-size:13px;font-weight:600;cursor:pointer;padding:8px 2px;margin-top:4px;text-decoration:underline}
  .lite{text-transform:none;color:#9aa0a3;font-weight:400}
  .sec-status{border-radius:9px;padding:9px 12px;font-size:12.5px;font-weight:700;margin-bottom:12px}
  .sec-status.ok{background:rgba(63,156,120,.14);color:#2b7a5b}
  .sec-status.warn{background:rgba(233,196,106,.18);color:#8a6a2f}
  .sec-step{border-left:3px solid var(--gold);background:#fbf7ee;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:10px;font-size:13.5px;line-height:1.5}
  .sec-step code{background:#eee;padding:1px 5px;border-radius:4px;font-size:12px}
  .demo-box{margin-top:22px;border-top:1px dashed var(--line);padding-top:18px}
  .demo-box .dl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:8px}
  .demo-box .drow{display:flex;gap:8px}
  .demo-box select{flex:1;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--white)}
  .demo-box .enter{background:var(--teal);color:var(--cream);border:none;border-radius:10px;padding:0 18px;font-weight:600}
  .demo-box .hint{font-size:12px;color:var(--muted);margin-top:8px}

  /* ---------- APP CHROME ---------- */
  header.app{background:var(--teal);color:var(--cream);position:sticky;top:0;z-index:40}
  .head-in{max-width:1120px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;align-items:flex-start;line-height:1.12}
  .brand-logo{height:30px;width:auto;object-fit:contain;align-self:flex-start;flex:none;display:block}
  .brand .name{font-family:"Playfair Display",serif;font-weight:700;font-size:19px}
  .brand .sub{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);font-weight:600;margin-top:4px}
  .login-logo{width:210px;max-width:70%;height:auto;object-fit:contain;margin:0 auto 8px;display:block}
  .head-spacer{flex:1}
  .whoami{display:flex;align-items:center;gap:10px}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--coral);color:#3a2312;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;overflow:hidden;flex:none}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .whoami:hover .avatar{box-shadow:0 0 0 2px rgba(233,196,106,.6)}
  .prof-row{display:flex;align-items:center;gap:16px}
  .prof-pic{width:76px;height:76px;border-radius:50%;background:var(--coral);color:#3a2312;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;overflow:hidden;flex:none;font-family:"Playfair Display",serif}
  .prof-pic img{width:100%;height:100%;object-fit:cover}
  .prof-actions{display:flex;gap:8px;flex-wrap:wrap}
  .whoami .nm{font-size:14px;font-weight:600;line-height:1.1}
  .role-badge{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:2px 7px;border-radius:5px}
  .role-admin{background:var(--gold);color:#4a3a12}
  .role-emp{background:rgba(255,255,255,.15);color:var(--cream)}
  .signout{background:rgba(255,255,255,.1);color:var(--cream);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600}
  .signout:hover{background:rgba(255,255,255,.2)}
  .bell{background:rgba(255,255,255,.1);color:var(--cream);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 11px;font-size:14px;font-weight:600;cursor:pointer;line-height:1}
  .cloud-badge{border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:6px 11px;font-size:11.5px;font-weight:700;cursor:pointer;line-height:1;white-space:nowrap;letter-spacing:.02em}
  .cloud-badge.ok{background:rgba(63,156,120,.22);color:#d9f5e8;border-color:rgba(63,156,120,.5)}
  .cloud-badge.local{background:rgba(233,196,106,.16);color:#f3e6c2;border-color:rgba(233,196,106,.4)}
  @media(max-width:640px){.cloud-badge{padding:6px 9px;font-size:10.5px}}
  .bell:hover{background:rgba(255,255,255,.2)}
  .switch-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;cursor:pointer}
  .switch-row>span{display:flex;flex-direction:column;gap:2px}
  .switch-row small{color:var(--muted);font-size:12px;font-weight:400}
  .switch-row input{width:20px;height:20px;flex:none;accent-color:var(--teal)}
  .yearpick{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid rgba(233,196,106,.35);border-radius:999px;padding:5px 6px 5px 13px}
  .yearpick label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold)}
  .yearpick select{background:transparent;color:var(--cream);border:none;font-weight:600;font-size:14px;outline:none}
  .yearpick select option{color:#000}

  .tabbar{background:var(--white);border-bottom:1px solid var(--line);position:sticky;top:63px;z-index:30}
  nav.tabs{display:flex;gap:2px;max-width:1120px;margin:0 auto;padding:0 20px;overflow-x:auto}
  .tab{background:none;border:none;color:var(--muted);padding:14px 16px 12px;font-weight:600;font-size:14px;border-bottom:3px solid transparent;white-space:nowrap}
  .tab.active{color:var(--teal);border-bottom-color:var(--coral)}
  .tab:hover{color:var(--teal)}

  /* ---------- SHARED UI ---------- */
  .section-title{display:flex;align-items:center;justify-content:space-between;margin:26px 0 14px;gap:12px;flex-wrap:wrap}
  .section-title h2{font-size:24px;color:var(--teal)}
  .section-title .hint{color:var(--muted);font-size:13px}
  .grid{display:grid;gap:14px}
  .cards{grid-template-columns:repeat(auto-fill,minmax(290px,1fr))}
  .card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .stat-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:6px 0}
  .stat{background:var(--teal);color:var(--cream);border-radius:14px;padding:16px 18px}
  .stat.alt{background:linear-gradient(140deg,#15515f,#0E3A47)}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:600}
  .stat .v{font-family:"Playfair Display",serif;font-size:30px;margin-top:4px}
  .stat .u{font-size:12px;color:rgba(246,241,231,.7);margin-left:4px}

  .bar{height:9px;border-radius:6px;background:var(--cream);border:1px solid var(--line);margin-top:6px;overflow:hidden}
  .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--coral),var(--gold))}
  .bar.over>span{background:linear-gradient(90deg,#d9694a,#c9603f)}
  .bal-row{display:flex;justify-content:space-between;font-size:13px;margin-top:12px;color:var(--muted)}
  .bal-row b{color:var(--ink)}
  .emp-card h3{font-size:17px;color:var(--teal)}
  .emp-meta{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .chips{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .chip{font-size:12px;background:var(--cream);border:1px solid var(--line);border-radius:999px;padding:4px 10px;color:var(--teal);font-weight:600}
  .chip.ot{background:#eef6f2;border-color:#cfe6da;color:var(--ok)}
  .chip.click{cursor:pointer}.chip.click:hover{background:#f3ead6}

  .btn{background:var(--coral);color:#3a2312;border:none;border-radius:9px;padding:10px 16px;font-weight:700;font-size:14px;box-shadow:0 2px 0 #d98a45}
  .btn:hover{filter:brightness(1.03)}.btn:active{transform:translateY(1px);box-shadow:0 1px 0 #d98a45}
  .btn.ghost{background:var(--white);color:var(--teal);border:1px solid var(--line);box-shadow:none}
  .btn.ghost:hover{background:var(--cream)}
  .btn.sm{padding:6px 11px;font-size:13px;box-shadow:none}
  .btn.danger{background:none;color:var(--warn);box-shadow:none;padding:6px 8px}
  .btn.danger:hover{text-decoration:underline}
  .btn.tiny{padding:4px 9px;font-size:12px;box-shadow:none}

  .tbl-wrap{background:var(--white);border:1px solid var(--line);border-radius:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;box-shadow:var(--shadow)}
  table{width:100%;border-collapse:collapse}
  th{background:#fbf7ee;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);padding:11px 14px;border-bottom:1px solid var(--line);font-weight:700}
  td{padding:11px 14px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fffdf6}
  .num{font-variant-numeric:tabular-nums;text-align:right}
  .note-cell{color:var(--muted);font-size:12px;max-width:200px}
  .type-pill{font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px;display:inline-block}
  .t-Vacation{background:#fdeede;color:#b9702f}.t-PTO{background:#e9f1f5;color:var(--teal)}
  .t-Sick{background:#f5e9ec;color:#a24a5e}.t-Personal{background:#efeadd;color:#8a7a3f}
  .t-Holiday{background:#e7f2ec;color:var(--ok)}.t-Unpaid{background:#eee;color:#555}
  .st-pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
  .st-approved{background:#e7f2ec;color:var(--ok)}.st-pending{background:#fdf1de;color:var(--pending)}
  .ft-tag{font-size:10px;font-weight:700;letter-spacing:.5px;padding:2px 6px;border-radius:4px;background:#e9f1f5;color:var(--teal)}
  .pt-tag{background:#f3ead6;color:#8a6a2f}

  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600}
  select.inp,input.inp,textarea.inp{border:1px solid var(--line);background:var(--white);border-radius:8px;padding:9px 11px;color:var(--ink);min-width:130px}
  select.inp:focus,input.inp:focus,textarea.inp:focus{outline:2px solid var(--coral);outline-offset:-1px;border-color:var(--coral)}
  .search{flex:1;min-width:150px}

  /* ---------- CALENDAR ---------- */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-nav{display:flex;align-items:center;gap:10px}
  .cal-nav button{background:var(--white);border:1px solid var(--line);border-radius:8px;width:34px;height:34px;font-size:16px;color:var(--teal)}
  .cal-nav button:hover{background:var(--cream)}
  .cal-month{font-family:"Playfair Display",serif;font-size:22px;color:var(--teal);min-width:200px;text-align:center}
  .cal-month:hover{color:var(--teal-2)}
  .cal-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:12px}
  .cal-legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
  .calendar{background:var(--white);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-dow{background:#fbf7ee;text-align:center;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;padding:9px 0;border-bottom:1px solid var(--line)}
  .cal-cell{min-height:96px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px 7px;position:relative;overflow:hidden}
  .cal-cell:nth-child(7n){border-right:none}
  .cal-cell.out{background:#faf7f0;color:#c7bfae}
  .cal-cell.today .cal-date{background:var(--coral);color:#3a2312;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-weight:700}
  .cal-date{font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:4px}
  .cal-ev{font-size:11px;padding:2px 6px;border-radius:5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
  .cal-ev.hol{background:#eaf6f0;color:#2f8f6b;border-left:3px solid #3f9c78}
  .cal-cell.isHol{background:linear-gradient(180deg,#f3faf6,#fff)}
  .cal-more{font-size:10.5px;color:var(--muted);font-weight:600}

  /* ---------- CALENDAR (Google-style month/week/day) ---------- */
  .cal-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .cal-title{font-family:"Playfair Display",Georgia,serif;font-size:22px;color:var(--teal);font-weight:700;min-width:0}
  .cal-navbtns{display:flex;align-items:center;gap:4px}
  .cal-navbtns button,.cal-todaybtn{background:var(--white);border:1px solid var(--line);border-radius:9px;height:36px;color:var(--teal);font-weight:600;cursor:pointer}
  .cal-navbtns button{width:36px;font-size:17px}
  .cal-todaybtn{padding:0 14px;font-size:13px}
  .cal-navbtns button:hover,.cal-todaybtn:hover{border-color:var(--coral)}
  .seg{display:inline-flex;background:#eef0ee;border-radius:10px;padding:3px}
  .seg button{border:none;background:transparent;padding:7px 14px;border-radius:8px;font-weight:700;font-size:13px;color:var(--muted);cursor:pointer}
  .seg button.on{background:var(--white);color:var(--teal);box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .cal-dot{width:7px;height:7px;border-radius:50%;flex:none}
  /* week view */
  .cal-week{display:flex;flex-direction:column;gap:10px}
  .wk-day{display:flex;gap:12px;background:var(--white);border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);cursor:pointer}
  .wk-day.today{border-color:var(--coral);box-shadow:0 0 0 2px rgba(244,162,97,.35)}
  .wk-date{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;width:52px;flex:none;border-right:1px solid var(--line);padding-right:12px}
  .wk-dow{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700}
  .wk-num{font-size:26px;font-weight:800;font-family:"Playfair Display",serif;color:var(--ink);line-height:1.1}
  .wk-day.today .wk-num{color:var(--coral)}
  .wk-items{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;justify-content:center}
  .wk-empty{color:#b8b0a0;font-size:13px;font-style:italic}
  .cal-chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;padding:4px 9px;border-radius:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  /* day view */
  .cal-dayview{background:var(--white);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .dv-head{padding:16px 18px;background:linear-gradient(180deg,#16515f,var(--teal));color:var(--cream)}
  .dv-dow{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--gold);font-weight:700}
  .dv-date{font-family:"Playfair Display",serif;font-size:26px;font-weight:800;margin-top:2px}
  .dv-body{padding:8px 14px 16px}
  .dv-sect{margin-top:14px}
  .dv-sect h4{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
  .dv-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;margin-bottom:7px;background:#faf7ef}
  .dv-row .di{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex:none;color:#fff}
  .dv-row .dt{flex:1;min-width:0}
  .dv-row .dt b{font-size:14.5px}
  .dv-row .dt small{display:block;color:var(--muted);font-size:12px}
  .dv-empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:14px}
  /* floating add button */
  .cal-fab{position:fixed;right:18px;bottom:calc(84px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;background:var(--coral);color:#3a2312;border:none;font-size:28px;font-weight:700;box-shadow:0 6px 20px rgba(244,162,97,.5);z-index:45;display:flex;align-items:center;justify-content:center;cursor:pointer}

  /* ---------- NOTIFICATION BANNER ---------- */

  /* ---------- MODAL ---------- */
  .overlay{position:fixed;inset:0;background:rgba(14,58,71,.42);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--teal);color:var(--cream);padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:80;box-shadow:var(--shadow)}

  /* ---------- TIMESHEET ---------- */
  .ts-toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .ts-toolbar .grow{flex:1}
  .round-sel{display:flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--line);border-radius:9px;padding:6px 10px}

  .ts-week-label{font-family:"Playfair Display",serif;color:var(--teal);font-size:16px;margin:18px 0 8px;display:flex;align-items:center;gap:10px}
  .ts-week-label .wsum{font-family:Inter;font-size:12px;font-weight:600;color:var(--muted);background:var(--cream);border:1px solid var(--line);border-radius:999px;padding:2px 10px}
  .ts-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:12px;margin:14px 0 22px}

  .tm-k{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700}

  .tm-v small{font-size:14px;color:var(--muted);font-weight:700;margin-left:2px}
  .tm-sub{font-size:11px;color:var(--muted);margin-top:3px}
  .tm.big{background:linear-gradient(135deg,var(--teal),var(--teal-2));border-color:transparent}
  .tm.big .tm-k{color:var(--gold)}
  .tm.big .tm-v{color:#fff}.tm.big .tm-v small{color:rgba(255,255,255,.7)}
  .tm.big .tm-sub{color:rgba(246,241,231,.82)}
  .tm.ot{background:#fdeede;border-color:#f0c9a8}
  .tm.ot .tm-v,.tm.ot .tm-k{color:#b9702f}
  .ts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px}
  .ts-day{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:0;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:0;min-height:130px;overflow:hidden}
  .ts-day.weekend{background:#faf7f0}
  .ts-day.holiday{background:#f2f8f4;border-color:#cfe6da}

  .ts-day-top{display:flex;justify-content:space-between;align-items:center;padding:9px 12px 7px;border-bottom:1px solid var(--line)}
  .ts-daycol{display:flex;align-items:baseline;gap:5px}
  .ts-dow{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:800}
  .ts-date{font-family:"Playfair Display",serif;font-size:19px;color:var(--teal);font-weight:800;line-height:1}
  .ts-mon{font-size:10px;color:var(--muted);font-weight:600}
  .ts-total{font-size:13px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;background:var(--cream);border:1px solid var(--line);border-radius:999px;padding:1px 9px}
  .ts-total.zero{color:#c7bfae;background:transparent;border-color:transparent}
  .ts-segs{display:flex;flex-direction:column;gap:5px;padding:9px 12px;flex:1}
  .ts-seg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--teal);font-weight:600;font-variant-numeric:tabular-nums}
  .ts-seg .seg-time{color:var(--ink);flex:1}
  .ts-seg b{color:var(--ink);float:none}
  .seg-lbl{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.5px;border-radius:5px;padding:1px 5px;color:#fff}
  .seg-lbl.k-am{background:var(--gold);color:#4a3a12}
  .seg-lbl.k-pm{background:var(--teal);color:#fff}
  .seg-lbl.k-note{background:var(--coral);color:#3a2312}
  table.paytbl th,table.paytbl td{white-space:nowrap}
  table.paytbl td.grand,table.paytbl th.num.grand,table.paytbl tfoot td.grand{font-weight:800;color:var(--teal)}
  table.paytbl td.otcell{color:var(--coral);font-weight:700}
  table.paytbl tfoot td{background:#fbf7ee;font-weight:700;border-top:2px solid var(--line)}
  .mini-hint{font-size:12.5px;color:var(--muted);margin-top:10px}
  .card.announce{border-left:4px solid var(--coral)}
  .card.announce.feed-event{border-left-color:var(--teal)}
  .card.announce.feed-bday{border-left-color:var(--gold);background:linear-gradient(180deg,#fffdf5,#fff)}
  .feed-ic{margin-right:2px}
  textarea.inp{width:100%;resize:vertical;min-height:80px}
  .section-title.sm{margin:18px 0 10px}
  .section-title.sm h2{font-size:18px}
  .dash-2col{display:grid;grid-template-columns:1.2fr .8fr;gap:20px;align-items:start;margin-top:6px}
  .ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
  @media(max-width:760px){.dash-2col,.ov-grid{grid-template-columns:1fr}}
  .bday-card{padding:8px 6px}
  .bday-row{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:10px}
  .bday-row+.bday-row{border-top:1px solid var(--line)}
  .bcake{font-size:20px;flex:none}
  .bgrow{display:flex;flex-direction:column;line-height:1.25}
  .bgrow b{font-size:14.5px;color:var(--ink)}
  .bwhen{font-size:12px;color:var(--muted)}
  .bwhen.today{color:var(--coral);font-weight:700}
  .wk-card{display:flex;flex-direction:column}
  .wk-head{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;color:var(--muted);margin-bottom:12px}
  .wk-head b{font-size:20px;color:var(--teal);font-family:"Playfair Display",serif}
  .wk-bars{display:flex;gap:8px;align-items:flex-end;height:96px;flex:1}
  .wk-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%}
  .wk-track{flex:1;width:100%;display:flex;align-items:flex-end;background:linear-gradient(#f4efe4,#faf7ef);border-radius:6px;overflow:hidden}
  .wk-fill{width:100%;background:var(--teal);border-radius:6px 6px 0 0;min-height:0;transition:height .3s}
  .wk-fill.today{background:var(--coral)}
  .wk-d{font-size:11px;color:var(--muted);font-weight:700}
  .wk-d.today{color:var(--coral)}
  /* quick actions */
  .qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
  @media(max-width:560px){.qa-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:480px){
    .wrap{padding:0 12px 96px}
    .section-title h2{font-size:21px}
    .btn{padding:11px 15px}
    .tab{padding:13px 13px 11px}
    .paytbl{min-width:540px}
  }
  .qa{display:flex;flex-direction:column;align-items:center;gap:7px;padding:16px 8px;background:#fff;border:1px solid var(--line);border-radius:14px;cursor:pointer;font:inherit;font-size:12.5px;font-weight:600;color:var(--teal);text-align:center;line-height:1.25;transition:transform .12s,box-shadow .12s,border-color .12s}
  .qa:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(14,58,71,.10);border-color:var(--teal)}
  .qa-ic{font-size:24px;line-height:1}
  /* quick-fill in day editor */
  .quickfill{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
  .qf{font:inherit;font-size:12px;font-weight:600;padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:#faf7ef;color:var(--teal);cursor:pointer}
  .qf:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
  .qf.copy{background:var(--teal);color:#fff;border-color:var(--teal)}
  .qf.copy:hover{background:#0b2f39}
  /* pickers (shirt) */
  .pick-row{display:flex;flex-wrap:wrap;gap:8px}
  .pick{font:inherit;font-size:13px;font-weight:600;padding:9px 14px;border-radius:10px;border:1.5px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:7px}
  .pick.on{border-color:var(--teal);background:#eef5f7;color:var(--teal)}
  .pick.swatch i{width:14px;height:14px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,.15)}
  .shirt-tag{display:inline-flex;align-items:center;gap:7px;font-size:13px}
  .shirt-tag i{width:13px;height:13px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,.15)}
  .mreq{display:flex;align-items:center;gap:11px;padding:9px 10px}
  .mreq+.mreq{border-top:1px solid var(--line)}
  .mreq .st-pill{margin-left:auto}
  /* footer */
  .app-foot{max-width:1080px;margin:26px auto 40px;padding:18px 22px 0;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
  .app-foot .ff{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px}
  .app-foot img{height:26px;opacity:.9}
  .app-foot .r{font-size:11px;color:var(--muted)}
  /* headline PTO card */
  .pto-card{display:flex;flex-direction:column;justify-content:center}
  .pto-big{font-family:"Playfair Display",serif;font-weight:800;font-size:44px;line-height:1;color:var(--teal)}
  .pto-big small{font-size:20px;font-weight:700;margin-left:4px;color:var(--muted)}
  .pto-lbl{font-size:13px;color:var(--muted);margin-top:4px;font-weight:600}
  .pto-lbl span{color:var(--muted);font-weight:400}
  /* photos */
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:16px}
  .photo-card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 4px 14px rgba(14,58,71,.06)}
  .photo-card img{width:100%;aspect-ratio:4/3;object-fit:cover;background:#eee;display:block}
  .photo-meta{padding:9px 12px 6px}
  .pc-cap{font-size:13.5px;color:var(--ink);line-height:1.3}
  .pc-by{font-size:11px;color:var(--muted);margin-top:3px}
  .photo-actions{display:flex;gap:6px;justify-content:flex-end;padding:0 10px 10px}
  /* calendar birthday + event pills */
  .cal-ev.bday{background:#f8ecd6;color:#a9741f;border-left:3px solid #c98b2e;font-weight:600}
  .cal-ev.evt{background:#e5eef1;color:var(--teal);border-left:3px solid var(--teal);font-weight:600}
  .cal-cell{cursor:pointer;transition:background .12s}
  .cal-cell:hover{background:#fbf7ee}
  .allot-inp{width:72px;padding:5px 7px;border:1px solid var(--line);border-radius:8px;font:inherit;font-weight:700;text-align:right;color:var(--teal)}
  .allot-inp:focus{outline:none;border-color:var(--teal)}
  .nopto-tag{display:inline-block;font-size:11px;font-weight:700;color:#9aa0a3;background:#f0f1f2;border-radius:6px;padding:2px 8px}
  .nopto-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  .nopto-chip{display:inline-flex;align-items:center;gap:8px;background:#f6f7f8;border:1px solid var(--line);border-radius:999px;padding:5px 6px 5px 13px;font-size:13px;color:var(--ink)}

  .leg-multi{display:inline-flex;gap:2px;vertical-align:middle;margin-right:4px}
  .leg-multi i{width:9px;height:9px;border-radius:2px;display:inline-block}
  .pto-link{color:var(--teal);cursor:pointer;border-bottom:1px dashed var(--teal)}
  .pto-link:hover{color:var(--coral);border-color:var(--coral)}
  .view-days{font-size:11px;color:var(--muted);cursor:pointer;margin-left:4px;white-space:nowrap}

  .pto-detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:6px 0 4px}
  @media(max-width:600px){.pto-detail-grid{grid-template-columns:1fr}}
  .pto-detail-grid .card{padding:14px 16px}
  .k2{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:6px}
  .pd-big{font-family:"Playfair Display",serif;font-weight:800;font-size:30px;line-height:1;color:var(--teal)}

  .logwrap[open]>summary::before{content:"▾ "}

  /* ---------- POLISH ---------- */
  *{-webkit-tap-highlight-color:transparent}
  /* ---------- DIRECT MESSAGES ---------- */
  .chat-list{display:flex;flex-direction:column;gap:10px}

  .ci-mid{flex:1;min-width:0}

  .ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .ci-time{color:var(--muted);font-size:11.5px;white-space:nowrap}
  .ci-unread{background:var(--coral);color:#3a2312;font-weight:800;font-size:11.5px;border-radius:10px;padding:1px 8px}

  .bubble-row.mine .bubble{background:var(--teal);color:var(--cream);border:none;border-radius:14px 14px 4px 14px}
  .bubble .bt{font-size:10px;opacity:.65;margin-top:4px;text-align:right}
  .chat-empty{color:var(--muted);text-align:center;margin:auto;font-size:14px}
  .chat-inputrow{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:var(--white)}
  .chat-inputrow input{flex:1;border:1px solid var(--line);border-radius:22px;padding:11px 16px;font-size:15px}
  .chat-inputrow input:focus{outline:2px solid var(--coral);outline-offset:-1px}
  .chat-send{background:var(--coral);border:none;border-radius:50%;width:44px;height:44px;font-size:17px;color:#3a2312;flex:none}

  /* ---------- MOBILE APP NAV ---------- */
  .bottom-nav{display:none}

    .brand-logo{height:24px}

  @media(max-width:640px){
    .overlay{align-items:flex-end;padding:0}

  }

  @media (prefers-reduced-motion:no-preference){
    #view{animation:viewIn .28s ease both}
    @keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .card,.stat,.qa,.emp-card{transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease}
    .modal{animation:modalIn .2s ease both}
    @keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}
  }
  .card:hover{box-shadow:0 8px 26px rgba(14,58,71,.10)}
  .emp-card:hover,.qa:hover{transform:translateY(-2px)}
  .btn{transition:transform .1s ease, box-shadow .1s ease, background .15s ease, filter .15s ease; cursor:pointer}
  .btn:hover{filter:brightness(1.03)}
  .btn:active{transform:translateY(1px)}

  /* ---------- PRINT ---------- */

  /* ============================================================
     FIRST REHABILITATION · NORTH PALM BEACH — DESIGN ELEVATION
     Coastal-luxury refinement layer: layered shadows, gold accents,
     refined type, and gentle motion. Loaded last so it wins.
     ============================================================ */
  :root{
    --gold-grad:linear-gradient(90deg,#E9C46A,#F4A261 55%,#E9C46A);
    --teal-grad:linear-gradient(160deg,#17566a 0%,#0E3A47 62%,#0B303B 100%);
    --shadow-1:0 1px 2px rgba(14,58,71,.06),0 4px 14px rgba(14,58,71,.07);
    --shadow-2:0 2px 6px rgba(14,58,71,.08),0 14px 34px rgba(14,58,71,.10);
    --shadow-3:0 8px 24px rgba(14,58,71,.14),0 28px 64px rgba(14,58,71,.16);
  }
  html{scroll-behavior:smooth}
  body{background:
      radial-gradient(1100px 500px at 85% -160px, rgba(233,196,106,.14), transparent 60%),
      radial-gradient(900px 460px at -140px 12%, rgba(20,80,95,.07), transparent 55%),
      var(--cream)}
  ::selection{background:rgba(233,196,106,.45)}
  *:focus-visible{outline:2px solid var(--coral);outline-offset:2px;border-radius:4px}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#d9d0bd;border-radius:8px;border:2px solid var(--cream)}
  ::-webkit-scrollbar-track{background:transparent}

  /* -- header: deep coastal teal with a gold hairline -- */
  header.app{background:var(--teal-grad);box-shadow:0 1px 0 rgba(233,196,106,.35),0 10px 30px rgba(14,58,71,.28)}
  header.app::after{content:"";display:block;height:2.5px;background:var(--gold-grad);opacity:.9}
  .brand .sub{letter-spacing:2.6px}

  /* -- login: sunrise-over-the-water moment -- */
  .login-screen{background:
      radial-gradient(1000px 520px at 72% -12%, rgba(233,196,106,.22), transparent 55%),
      radial-gradient(1300px 700px at 70% -10%, #17566a 0%, var(--teal) 52%, #0B303B 100%)}
  .login-card{border-radius:24px;box-shadow:var(--shadow-3),0 0 0 1px rgba(233,196,106,.22)}
  .login-head{background:var(--teal-grad);position:relative;padding-bottom:30px}
  .login-head::after{content:"";position:absolute;left:24%;right:24%;bottom:16px;height:2px;background:var(--gold-grad);border-radius:2px;opacity:.85}
  .login-head .loc{font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(246,241,231,.72);margin-top:7px;font-weight:600}
  .btn-full{background:linear-gradient(180deg,#f6ad72,#F4A261);border-radius:13px;box-shadow:0 3px 0 #d98a45,0 10px 22px rgba(244,162,97,.35);transition:transform .12s,box-shadow .12s}
  .btn-full:hover{transform:translateY(-1px);box-shadow:0 4px 0 #d98a45,0 14px 26px rgba(244,162,97,.42)}
  .btn-full:active{transform:translateY(1px);box-shadow:0 1px 0 #d98a45}

  /* -- section titles get a gold tick -- */
  .section-title h2{display:flex;align-items:center;gap:10px;letter-spacing:.2px}
  .section-title h2::before{content:"";width:5px;height:22px;border-radius:3px;background:var(--gold-grad);box-shadow:0 1px 4px rgba(233,196,106,.5);flex:none}
  .section-title.sm h2::before{height:16px;width:4px}

  /* -- cards & tables: soft depth, gentle lift -- */
  .card{border-radius:16px;border-color:#eee6d6;box-shadow:var(--shadow-1);transition:box-shadow .18s,transform .18s}
  .tbl-wrap{border-radius:16px;border-color:#eee6d6;box-shadow:var(--shadow-1)}
  @media(hover:hover){
    .card:hover,.tbl-wrap:hover{box-shadow:var(--shadow-2)}
    .chat-item:hover,.wk-day:hover{transform:translateY(-1px);box-shadow:var(--shadow-2)}
  }
  th{background:linear-gradient(180deg,#fcf8ef,#f7f1e2);letter-spacing:1.4px}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:#fdfaf2}

  /* -- stat tiles: jewel gradient with inner glow -- */
  .stat{background:var(--teal-grad);border-radius:16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.09),var(--shadow-1);position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;top:-40%;right:-20%;width:70%;height:120%;background:radial-gradient(closest-side,rgba(233,196,106,.16),transparent);pointer-events:none}
  .stat .k{letter-spacing:1.8px}
  .stat .v{font-weight:700}

  /* -- buttons: dimensional coral -- */
  .btn{background:linear-gradient(180deg,#f6ad72,#F4A261);border-radius:11px;box-shadow:0 2px 0 #d98a45,0 6px 14px rgba(244,162,97,.28);transition:transform .12s,box-shadow .12s,filter .12s}

  .btn.ghost{background:var(--white);box-shadow:var(--shadow-1)}
  .btn.ghost:hover{box-shadow:var(--shadow-2)}
  .btn.danger{box-shadow:none}

  /* -- tabs: animated gold underline -- */
  .tab{position:relative;transition:color .15s}
  .tab::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:3px;border-radius:3px;background:var(--gold-grad);transform:scaleX(0);transition:transform .2s ease}

  .tab.active::after{transform:scaleX(1)}

  /* -- bottom nav: floating glass bar -- */
  @media(max-width:740px){

  .modal{border-radius:20px;box-shadow:var(--shadow-3),0 0 0 1px rgba(233,196,106,.18)}

  /* -- punch clock: the hero of the employee home -- */
  .clock-card{display:flex;align-items:center;gap:16px;background:var(--teal-grad);color:var(--cream);border:none;margin-bottom:16px;box-shadow:var(--shadow-2);position:relative;overflow:hidden}

  .cc-left{flex:1;min-width:0}
  .cc-time{font-family:"Playfair Display",serif;font-size:32px;font-weight:800;line-height:1.05}
  .cc-sub{font-size:13.5px;color:rgba(246,241,231,.88);margin-top:3px}
  .cc-sub b{color:var(--gold)}
  .cc-segs{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;font-size:11.5px;font-weight:600}
  .cc-segs span{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:3px 9px}
  .cc-btn{background:linear-gradient(180deg,#f6ad72,#F4A261);color:#3a2312;border:none;border-radius:15px;padding:17px 22px;font-weight:800;font-size:15.5px;box-shadow:0 3px 0 #d98a45,0 12px 26px rgba(244,162,97,.45);cursor:pointer;flex:none;transition:transform .12s,box-shadow .12s;white-space:nowrap}
  .cc-btn:hover{transform:translateY(-1px)}
  .cc-btn:active{transform:translateY(1px);box-shadow:0 1px 0 #d98a45}
  .cc-btn.out{background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.09));color:var(--cream);border:1px solid rgba(233,196,106,.55);box-shadow:0 8px 20px rgba(0,0,0,.22)}
  @media(max-width:480px){.cc-time{font-size:26px}.cc-btn{padding:15px 18px;font-size:14.5px}}

  /* -- update-ready pill: waits politely instead of reloading over your typing -- */
  .upd-pill{position:fixed;bottom:calc(96px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:70;
    background:rgba(11,48,59,.96);color:var(--cream);border:1px solid rgba(233,196,106,.55);border-radius:999px;
    padding:11px 18px;font-weight:700;font-size:13px;box-shadow:var(--shadow-2);cursor:pointer;backdrop-filter:blur(8px)}
  .upd-pill:hover{border-color:var(--gold)}
  @media(min-width:741px){.upd-pill{bottom:28px}}

  /* -- gentle entrance for each view -- */
  @media(prefers-reduced-motion:no-preference){
    #view{animation:viewIn .28s ease both}
    @keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  }
</style>
</head>

/* common US holidays for a given year (fixed + floating) */
function nthDow(y,mon,dow,n){ let d=new Date(y,mon,1),cnt=0; while(d.getMonth()===mon){ if(d.getDay()===dow){cnt++; if(cnt===n)return new Date(d);} d.setDate(d.getDate()+1);} return null; }
function lastDow(y,mon,dow){ let d=new Date(y,mon+1,0); while(d.getDay()!==dow)d.setDate(d.getDate()-1); return d; }

/* banked overtime = manual starting balance + OT earned on approved timesheets — all counts toward PTO */

/* upcoming birthdays */
function nextBdays(n){
  const today=new Date(); today.setHours(0,0,0,0);
  const list=DB.employees.filter(e=>e.active && e.bday).map(e=>{
    const p=String(e.bday).split("/"), mm=parseInt(p[0]), dd=parseInt(p[1]);
    let d=new Date(today.getFullYear(),mm-1,dd); if(d<today) d=new Date(today.getFullYear()+1,mm-1,dd);
    return {e,d,days:Math.round((d-today)/86400000)};
  }).sort((a,b)=>a.days-b.days);
  return n?list.slice(0,n):list;
}

function weekSnapshot(empId){

  const diff=Math.floor((today-ps)/86400000), wk=diff>=7?1:0;
  const days=ts.days.slice(wk*7,wk*7+7);
  const hrs=days.map(d=>dayWorked(d,false));
  return {days,hrs,total:hrs.reduce((a,b)=>a+b,0),today};
}

let CHAT_WITH=null, CHAT_DRAFT="";
function rmFor(mine,other){ return (DB.readmarks||[]).find(r=>r.id===mine+"|"+other); }
function chatUnreadFrom(other){ const rm=rmFor(SESSION,other); const since=rm?rm.ts:0; return (DB.messages||[]).filter(m=>m.from===other&&m.to===SESSION&&m.ts>since).length; }
function chatUnread(){ if(!SESSION||!DB)return 0; const others=new Set((DB.messages||[]).filter(m=>m.to===SESSION).map(m=>m.from)); let n=0; others.forEach(o=>n+=chatUnreadFrom(o)); return n; }
function markChatRead(other){ let rm=rmFor(SESSION,other); if(!rm){ rm={id:SESSION+"|"+other,ts:Date.now()}; DB.readmarks.push(rm); } else rm.ts=Date.now(); save(true); }
function lastMsgWith(other){ const ms=(DB.messages||[]).filter(m=>(m.from===SESSION&&m.to===other)||(m.from===other&&m.to===SESSION)); return ms.length?ms.reduce((a,b)=>a.ts>b.ts?a:b):null; }
function openChat(other){ CHAT_WITH=other; CHAT_DRAFT=""; markChatRead(other); render(); setTimeout(()=>{ const i=$("#chatInput"); if(i)i.focus(); },60); }
function sendDM(){
  const inp=$("#chatInput"); const text=(inp?inp.value:"").trim(); if(!text||!CHAT_WITH)return;
  DB.messages.push({id:uid("m"),from:SESSION,to:CHAT_WITH,text,ts:Date.now()});
  CHAT_DRAFT="";
  markChatRead(CHAT_WITH);   // also saves everything
  const who=emp(CHAT_WITH);
  if(who&&who.email) sendPushNotify({kind:"dm",toEmail:who.email,title:"💬 "+emp(SESSION).name,body:text.slice(0,140),url:"/"});
  render(); setTimeout(()=>{ const i=$("#chatInput"); if(i)i.focus(); },30);
}
function fmtMsgTime(ts){ const d=new Date(ts), now=new Date();
  return d.toDateString()===now.toDateString()
    ? d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})
    : d.toLocaleDateString("en-US",{month:"short",day:"numeric"})+", "+d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}); }
function viewChat(v){
  if(CHAT_WITH){
    const other=emp(CHAT_WITH);
    if(!other){ CHAT_WITH=null; viewChat(v); return; }
    if(chatUnreadFrom(CHAT_WITH)) markChatRead(CHAT_WITH);   // arriving messages are read while the thread is open
    const ms=(DB.messages||[]).filter(m=>(m.from===SESSION&&m.to===CHAT_WITH)||(m.from===CHAT_WITH&&m.to===SESSION)).sort((a,b)=>a.ts-b.ts);
    v.innerHTML=`
     <div class="chat-thread card">
       <div class="chat-head">
         <button class="btn ghost sm" onclick="CHAT_WITH=null;render()" aria-label="Back">←</button>
         <div class="avatar">${other.photo?`<img src="${other.photo}" alt="">`:initials(other.name)}</div>
         <div><b>${esc(other.name)}</b><div class="chat-sub">${other.role==="admin"?"Admin":"Team member"}</div></div>
       </div>
       <div class="chat-scroll" id="chatScroll">
         ${ms.length?ms.map(m=>`<div class="bubble-row ${m.from===SESSION?"mine":""}"><div class="bubble">${esc(m.text)}<div class="bt">${fmtMsgTime(m.ts)}</div></div></div>`).join(""):`<div class="chat-empty">Say hi 👋 — messages are private between the two of you.</div>`}
       </div>
       <div class="chat-inputrow">
         <input id="chatInput" placeholder="Message ${esc(other.first)}…" value="${esc(CHAT_DRAFT)}" oninput="CHAT_DRAFT=this.value" onkeydown="if(event.key==='Enter')sendDM()" autocomplete="off">
         <button class="chat-send" onclick="sendDM()" aria-label="Send">➤</button>
       </div>
     </div>`;
    const box=$("#chatScroll"); if(box)box.scrollTop=box.scrollHeight;
    return;
  }
  const people=DB.employees.filter(e=>e.active!==false&&e.id!==SESSION).slice()
    .sort((a,b)=>{ const la=lastMsgWith(a.id),lb=lastMsgWith(b.id); return ((lb?lb.ts:0)-(la?la.ts:0))||a.name.localeCompare(b.name); });
  v.innerHTML=`
   <div class="section-title"><h2>Messages</h2><span class="hint">Private one-on-one messages with anyone on the team.</span></div>
   <div class="chat-list">
   ${people.map(p=>{ const lm=lastMsgWith(p.id), un=chatUnreadFrom(p.id);
     return `<button class="chat-item" onclick="openChat('${p.id}')">
       <div class="avatar">${p.photo?`<img src="${p.photo}" alt="">`:initials(p.name)}</div>
       <div class="ci-mid"><b>${esc(p.name)}</b><div class="ci-prev">${lm?(lm.from===SESSION?"You: ":"")+esc(lm.text.slice(0,60)):"No messages yet"}</div></div>
       <div class="ci-right">${lm?`<span class="ci-time">${fmtMsgTime(lm.ts)}</span>`:""}${un?`<span class="ci-unread">${un}</span>`:""}</div>
     </button>`; }).join("")}
   </div>`;
}

function annPast(a){ if(!a.date) return false; const t=new Date(); t.setHours(0,0,0,0); return toDate(a.date) < t; }
function feedWhen(dateMdy,time){ if(!dateMdy) return null; const d=toDate(dateMdy); if(time){ const t=to24(time); if(t){ const p=t.split(":"); d.setHours(+p[0],+p[1],0,0); } } return d; }
function niceWhen(dateMdy,time){ const t0=new Date(); t0.setHours(0,0,0,0); let s=""; if(dateMdy){ const d=toDate(dateMdy); const isToday=+new Date(d.getFullYear(),d.getMonth(),d.getDate())===+t0; s=isToday?"Today":d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); } if(time) s+=(s?" · ":"")+time; return s; }
function feedItems(){
  const t0=new Date(); t0.setHours(0,0,0,0); const now=Date.now(); const items=[];
  (DB.announcements||[]).forEach(a=>{ const w=feedWhen(a.date,a.time);
    items.push({kind:"ann",id:a.id,title:a.title,body:a.body,author:a.author||"Management",whenLbl:a.date?niceWhen(a.date,a.time):(a.dateStr||""),sort:(w?w.getTime():now),past:annPast(a)}); });
  (DB.events||[]).forEach(ev=>{ const w=feedWhen(ev.date,ev.time); const endD=ev.end?toDate(ev.end):toDate(ev.date);
    items.push({kind:"event",id:ev.id,title:ev.title,body:ev.note||"",author:empName(ev.empId),whenLbl:niceWhen(ev.date,ev.time),sort:(w?w.getTime():0),past:endD<t0}); });
  DB.employees.filter(e=>e.active&&e.bday).forEach(e=>{ const p=String(e.bday).split("/"); const bd=new Date(t0.getFullYear(),+p[0]-1,+p[1]);
    if(+bd===+t0) items.push({kind:"bday",id:"bd_"+e.id,title:`It's ${e.first}${e.last?" "+e.last[0]+".":""}'s birthday today!`,body:"",author:"",whenLbl:"Today",sort:t0.getTime()-1,past:false}); });
  return items;
}
function hasActiveFeed(){ return feedItems().some(i=>!i.past); }
function feedCard(it,admin){
  const icon=it.kind==="event"?"📌":it.kind==="bday"?"🎂":"📣";
  const cls=it.kind==="bday"?"feed-bday":it.kind==="event"?"feed-event":"feed-ann";
  let meta;
  if(it.kind==="bday") meta="Today 🎉";
  else if(it.kind==="event") meta=`${it.whenLbl?esc(it.whenLbl):""}${it.author?(it.whenLbl?" · ":"")+"added by "+esc(it.author):""}`;
  else meta=`${esc(it.author)}${it.whenLbl?" · "+esc(it.whenLbl):""}`;
  let actions="";
  if(admin&&it.kind==="ann") actions=`<div class="row-actions"><button class="btn sm ghost" onclick="openAnnounce('${it.id}')">Edit</button><button class="btn danger" onclick="delAnnounce('${it.id}')">Delete</button></div>`;
  else if(admin&&it.kind==="event") actions=`<div class="row-actions"><button class="btn sm ghost" onclick="openEvent(null,'${it.id}')">Edit</button><button class="btn danger" onclick="delEvent('${it.id}')">Remove</button></div>`;
  return `<div class="card announce ${cls}">
     <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
       <div style="min-width:0"><h3 style="font-size:16px;color:var(--teal)"><span class="feed-ic">${icon}</span> ${esc(it.title)}</h3>
       ${meta?`<div style="font-size:11px;color:var(--muted);margin-top:3px">${meta}</div>`:""}</div>
       ${actions}
     </div>
     ${it.body?`<div style="margin-top:7px;white-space:pre-wrap">${esc(it.body)}</div>`:""}
   </div>`;
}
function announceListHTML(admin){
  const all=feedItems();
  const active=all.filter(i=>!i.past).sort((a,b)=>a.sort-b.sort);
  const pastAnn=all.filter(i=>i.past&&i.kind==="ann").sort((a,b)=>b.sort-a.sort);
  if(!active.length && !(admin&&pastAnn.length)) return `<div class="card" style="color:var(--muted)">Nothing on the board yet${admin?" — post an announcement, or add an event to the calendar.":"."}</div>`;
  let html=active.length?`<div class="grid" style="grid-template-columns:1fr;gap:10px">`+active.map(i=>feedCard(i,admin)).join("")+`</div>`
    :`<div class="card" style="color:var(--muted)">Nothing current on the board.</div>`;
  if(admin&&pastAnn.length) html+=`<details class="logwrap" style="margin-top:8px"><summary>Past announcements (${pastAnn.length})</summary><div class="grid" style="grid-template-columns:1fr;gap:10px;margin-top:8px">`+pastAnn.map(i=>feedCard(i,true)).join("")+`</div></details>`;
  return html;
}
function openAnnounce(editId){
  const a=editId?(DB.announcements||[]).find(x=>x.id===editId):null;
  openModal(`<h3>${a?"Edit announcement":"Post announcement"}</h3><div class="body">
    <div class="field"><label>Title</label><input class="inp" id="an_title" placeholder="e.g. Office closed July 4th" value="${a?esc(a.title):""}"></div>
    <div class="field"><label>Message</label><textarea class="inp" id="an_body" rows="4" placeholder="Write your announcement to the whole team…">${a?esc(a.body):""}</textarea></div>
    <div class="row2"><div class="field"><label>Date <span style="text-transform:none;color:#aaa">(optional)</span></label><input class="inp" type="date" id="an_date" value="${a&&a.date?toISO(a.date):""}"></div>

  </div><div class="foot"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveAnnounce('${editId||""}')">${a?"Save changes":"Post to team"}</button></div>`);

function saveAnnounce(editId){
  const title=$("#an_title").value.trim(), body=$("#an_body").value.trim();
  if(!title){flash("Add a title");return;}
  const dISO=$("#an_date")?$("#an_date").value:""; const date=dISO?readDate(dISO):"";
  const t24=$("#an_time")?$("#an_time").value:""; const time=t24?to12(t24):"";
  const disp=date?toDate(date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  if(editId){ const a=DB.announcements.find(x=>x.id===editId); if(a){ a.title=title; a.body=body; a.date=date; a.time=time; a.dateStr=disp; } flash("Announcement updated"); }
  else { DB.announcements.push({id:uid("an"),title,body,author:emp(SESSION).name,ts:Date.now(),date,time,dateStr:disp}); flash("Announcement posted");
    sendPushNotify({kind:"announce",title:"📣 "+title,body:(body||"").slice(0,140),url:"/"})
      .then(n=>{ if(n==null)return; flash(n>0?`📣 Sent to ${n} phone${n===1?"":"s"}`:"Posted — no one has notifications turned on yet"); }); }
  save();closeModal();render();
}
function delAnnounce(id){ if(!confirm("Delete this announcement?"))return; DB.announcements=DB.announcements.filter(a=>a.id!==id); save();render(); }

let PH_DATA="";
function previewPhoto(){
  const f=$("#ph_file").files&&$("#ph_file").files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=1280; let w=img.width,h=img.height;
      if(w>max||h>max){ if(w>=h){h=Math.round(h*max/w);w=max;} else {w=Math.round(w*max/h);h=max;} }
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      PH_DATA=c.toDataURL("image/jpeg",0.82);
      const pv=$("#ph_img"); if(pv)pv.src=PH_DATA; const box=$("#ph_prev"); if(box)box.style.display="block";
      const sv=$("#ph_save"); if(sv)sv.disabled=false;
    };
    img.src=e.target.result;
  };
  rd.readAsDataURL(f);
}

function shortTime(t){ if(!t)return""; const m=String(t).match(/(\d+):(\d+)\s*(AM|PM)/i); if(!m)return t; const mm=m[2]==="00"?"":":"+m[2]; return m[1]+mm+(/PM/i.test(m[3])?"p":"a"); }

/* ================= SHARED CALENDAR ================= */
/* ---- shared: everything happening on one date ---- */
function sameYMD(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function dayItems(date){
  const y=date.getFullYear(),m=date.getMonth(),dn=date.getDate();
  const offs=DB.timeoff.filter(t=>{ if(t.status!=="approved")return false; const s=toDate(t.date),e=t.end?toDate(t.end):s; return date>=stripT(s)&&date<=stripT(e); });
  const events=(DB.events||[]).filter(ev=>{ const s=toDate(ev.date),e=ev.end?toDate(ev.end):s; return date>=stripT(s)&&date<=stripT(e); }).sort((a,b)=>(to24(a.time||"")||"99").localeCompare(to24(b.time||"")||"99"));
  const bdays=DB.employees.filter(e=>e.active&&e.bday).filter(e=>{const p=String(e.bday).split("/");return +p[0]-1===m&&+p[1]===dn;});
  const holName=(usHolidays(y).find(h=>{const p=h.key.split("/");return +p[0]-1===m&&+p[1]===dn;})||{}).name||null;
  return {offs,events,bdays,holName};
}
function stripT(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function calItemCount(it){ return it.offs.length+it.events.length+it.bdays.length+(it.holName?1:0); }

function viewCalendar(v){
  const title = calView==="month" ? calMonth.toLocaleString("en-US",{month:"long",year:"numeric"})
    : calView==="week" ? weekRangeLabel(calDay)
    : calDay.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  const seg=`<div class="seg">
    <button class="${calView==="month"?"on":""}" onclick="setCalView('month')">Month</button>
    <button class="${calView==="week"?"on":""}" onclick="setCalView('week')">Week</button>
    <button class="${calView==="day"?"on":""}" onclick="setCalView('day')">Day</button></div>`;
  const body = calView==="month"?calMonthHTML():calView==="week"?calWeekHTML():calDayHTML();
  v.innerHTML=`
   <div class="cal-toolbar">
     <div class="cal-navbtns"><button onclick="calNav(-1)" aria-label="Previous">‹</button><button onclick="calNav(1)" aria-label="Next">›</button></div>
     <button class="cal-todaybtn" onclick="calGoToday()">Today</button>
     <div class="cal-title" style="flex:1">${esc(title)}</div>
     ${seg}
   </div>
   ${body}
   <button class="cal-fab" onclick="openEventForFocus()" aria-label="Add to calendar" title="Add to calendar">＋</button>`;
}
function calMonthHTML(){
  const y=calMonth.getFullYear(),m=calMonth.getMonth();
  const first=new Date(y,m,1),startDow=first.getDay(),daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();
  let cells="";
  const totalCells=Math.ceil((startDow+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    const dayNum=i-startDow+1;
    if(dayNum<1||dayNum>daysInMonth){cells+=`<div class="cal-cell out"></div>`;continue;}
    const date=new Date(y,m,dayNum), iso=`${y}-${pad(m+1)}-${pad(dayNum)}`;
    const it=dayItems(date), isToday=sameYMD(today,date);
    const usedC=new Set();
    const pickC=base=>{ if(!usedC.has(base)){usedC.add(base);return base;} for(const c of PERSON_COLORS){ if(!usedC.has(c)){usedC.add(c);return c;} } return base; };
    let items=[], dots=[];
    if(it.holName){ items.push(`<div class="cal-ev hol">🎉 ${esc(it.holName)}</div>`); dots.push(`<i class="cal-dot" style="background:#3f9c78"></i>`); }
    it.bdays.forEach(e=>{ items.push(`<div class="cal-ev bday">🎂 ${esc(e.first)}</div>`); dots.push(`<i class="cal-dot" style="background:#c98b2e"></i>`); });
    it.events.forEach(ev=>{const c=pickC(eventColor(ev.id));items.push(`<div class="cal-ev" style="background:${c}1e;color:${c};border-left:3px solid ${c}">📌 ${ev.time?esc(shortTime(ev.time))+" ":""}${esc(ev.title)}</div>`);dots.push(`<i class="cal-dot" style="background:${c}"></i>`);});
    it.offs.forEach(t=>{const c=pickC(personColor(t.empId));const nm=emp(t.empId);items.push(`<div class="cal-ev" style="background:${c}1e;color:${c};border-left:3px solid ${c}">${esc(nm?nm.first:"")}</div>`);dots.push(`<i class="cal-dot" style="background:${c}"></i>`);});
    const cap=4, shownHTML=items.slice(0,cap).join(""), more=items.length>cap?`<div class="cal-more">+${items.length-cap} more</div>`:"";
    cells+=`<div class="cal-cell ${isToday?"today":""} ${it.holName?"isHol":""}" onclick="openDayView('${iso}')">
        <div class="cal-date">${dayNum}</div>${shownHTML}${more}<div class="cal-dots">${dots.slice(0,6).join("")}</div></div>`;
  }
  return `<div class="calendar"><div class="cal-grid">
     ${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div class="cal-dow">${d}</div>`).join("")}
     ${cells}
   </div></div>
   <p class="mini-hint">Tap any day to see it in detail, or hit ＋ to add an event.</p>`;
}
function chipFor(it,label,icon,color){ return `<span class="cal-chip" style="background:${color}1e;color:${color}">${icon} ${esc(label)}</span>`; }
function dayChips(it){
  let chips=[];
  if(it.holName) chips.push(chipFor(it,it.holName,"🎉","#3f9c78"));
  it.bdays.forEach(e=>chips.push(chipFor(it,e.first+"'s birthday","🎂","#c98b2e")));
  it.events.forEach(ev=>chips.push(chipFor(it,(ev.time?shortTime(ev.time)+" ":"")+ev.title,"📌",eventColor(ev.id))));
  it.offs.forEach(t=>{const nm=emp(t.empId);chips.push(chipFor(it,(nm?nm.first:"")+" off","🌴",personColor(t.empId)));});
  return chips;
}
function calWeekHTML(){
  const start=weekStart(calDay), today=new Date();
  let rows="";
  for(let i=0;i<7;i++){
    const d=new Date(start.getFullYear(),start.getMonth(),start.getDate()+i);
    const it=dayItems(d), chips=dayChips(it), iso=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    rows+=`<div class="wk-day ${sameYMD(today,d)?"today":""}" onclick="openDayView('${iso}')">
      <div class="wk-date"><span class="wk-dow">${d.toLocaleDateString("en-US",{weekday:"short"})}</span><span class="wk-num">${d.getDate()}</span></div>
      <div class="wk-items">${chips.length?chips.join(""):`<span class="wk-empty">Nothing scheduled</span>`}</div>
    </div>`;
  }
  return `<div class="cal-week">${rows}</div>`;
}
function calDayHTML(){
  const it=dayItems(calDay), admin=emp(SESSION)&&emp(SESSION).role==="admin";
  const row=(color,icon,title,sub,ev)=>`<div class="dv-row"><div class="di" style="background:${color}">${icon}</div><div class="dt"><b>${esc(title)}</b>${sub?`<small>${esc(sub)}</small>`:""}</div>${ev&&(admin||ev.empId===SESSION)?`<div class="row-actions"><button class="btn sm ghost" onclick="event.stopPropagation();openEvent(null,'${ev.id}')">Edit</button></div>`:""}</div>`;
  let out="";
  if(it.holName) out+=`<div class="dv-sect"><h4>Holiday</h4>${row("#3f9c78","🎉",it.holName,"US holiday")}</div>`;
  if(it.bdays.length) out+=`<div class="dv-sect"><h4>Birthdays</h4>${it.bdays.map(e=>row("#c98b2e","🎂",e.name,"Birthday 🎉")).join("")}</div>`;
  if(it.events.length) out+=`<div class="dv-sect"><h4>Events</h4>${it.events.map(ev=>row(eventColor(ev.id),"📌",ev.title,[ev.time?ev.time:"",ev.note||"","added by "+empName(ev.empId)].filter(Boolean).join(" · "),ev)).join("")}</div>`;
  if(it.offs.length) out+=`<div class="dv-sect"><h4>Out of office</h4>${it.offs.map(t=>{const nm=emp(t.empId);return row(personColor(t.empId),(nm&&nm.photo?"":"🌴"),(nm?nm.name:"")+" — off",[t.type,t.date+(t.end?" – "+t.end:"")].filter(Boolean).join(" · "));}).join("")}</div>`;
  if(!out) out=`<div class="dv-empty">Nothing on the calendar this day.<br><span style="font-size:13px">Tap ＋ to add something.</span></div>`;
  return `<div class="cal-dayview">
    <div class="dv-head"><div class="dv-dow">${calDay.toLocaleDateString("en-US",{weekday:"long"})}</div><div class="dv-date">${calDay.toLocaleDateString("en-US",{month:"long",day:"numeric"})}</div></div>
    <div class="dv-body">${out}</div></div>`;
}
/* week helpers */
function weekStart(d){ const s=new Date(d.getFullYear(),d.getMonth(),d.getDate()); s.setDate(s.getDate()-s.getDay()); return s; }
function weekRangeLabel(d){ const s=weekStart(d), e=new Date(s.getFullYear(),s.getMonth(),s.getDate()+6);
  const sm=s.toLocaleDateString("en-US",{month:"short",day:"numeric"}), em=e.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  return `${sm} – ${em}`; }
/* view + navigation */
function setCalView(mode){ calView=mode; if(mode!=="month"){ /* keep calMonth in sync for consistency */ } render(); window.scrollTo(0,0); }
function calNav(n){
  if(calView==="month"){ calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+n,1); calDay=new Date(calMonth); }
  else if(calView==="week"){ calDay=new Date(calDay.getFullYear(),calDay.getMonth(),calDay.getDate()+7*n); calMonth=new Date(calDay.getFullYear(),calDay.getMonth(),1); }
  else { calDay=new Date(calDay.getFullYear(),calDay.getMonth(),calDay.getDate()+n); calMonth=new Date(calDay.getFullYear(),calDay.getMonth(),1); }
  render();
}
function calGoToday(){ const t=new Date(); calDay=t; calMonth=new Date(t.getFullYear(),t.getMonth(),1); render(); }
function openDayView(iso){ const p=iso.split("-").map(Number); calDay=new Date(p[0],p[1]-1,p[2]); calMonth=new Date(p[0],p[1]-1,1); calView="day"; render(); window.scrollTo(0,0); }
function openEventForFocus(){ const d=calView==="month"?new Date():calDay; openEvent(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`); }
/* legacy names still referenced elsewhere */
function calStep(n){ calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+n,1); render(); }
function calToday(){ calGoToday(); }

function normDate(s){s=String(s||"").trim();if(!s)return"";const p=s.split(/[\/\-.]/);if(p.length<2)return"";let m=+p[0],d=+p[1],y=p[2]?+p[2]:YEAR;if(isNaN(m)||isNaN(d))return"";if(y<100)y+=2000;if(m<1||m>12||d<1||d>31)return"";return `${m}/${d}/${y}`;}

function saveTimeOff(editId){
  const isAdm=emp(SESSION)&&emp(SESSION).role==="admin";
  const empId=isAdm?$("#m_emp").value:SESSION,date=readDate($("#m_date").value),hours=parseFloat($("#m_hours").value),type=$("#m_type").value,end=$("#m_end").value.trim()?readDate($("#m_end").value):"",note=$("#m_note").value.trim();

function bizDays(s,e){ let n=0; for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){const w=d.getDay();if(w>=1&&w<=5)n++;} return n; }

function removeEmp(id){
